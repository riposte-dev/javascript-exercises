<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let primeNumbers = [2];
        let n = +prompt("Enter an integer greater than 1", "2");

        /* We check for primes by checking whether it is divisible by any of the previous primes */

        outer: for (let i = 2; i <= n; i++) {
            for (primeNumber of primeNumbers) {
                if (i % primeNumber == 0) {
                    continue outer;
                }
            }
            
            primeNumbers.push(i);
        }
        
        console.log(primeNumbers);
    </script>    
</body>
</html>
