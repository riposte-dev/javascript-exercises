<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        while (true) {
            let userInput = +prompt("Pick a number greater than 100");

            if (userInput > 100 || !userInput) {
                break;
            }
        }
    </script>
</body>
</html>
