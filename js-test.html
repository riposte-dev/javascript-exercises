<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function shuffle(arr) {
            /* Generate random number from -1 to 1 */
            arr.sort((a, b) => 2 * Math.random() + -1);
        }

        let arr = [1, 2, 3];

        shuffle(arr);
        // arr = [3, 2, 1]

        shuffle(arr);
        // arr = [2, 1, 3]

        shuffle(arr);
        // arr = [3, 1, 2]
        // ...
    </script>    
</body>
</html>
