<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function capitalize(phrase) {
            return phrase[0].toUpperCase() + phrase.slice(1).toLowerCase();
        }

        console.log(capitalize("abcd"));
        console.log(capitalize("ABCD"));
        console.log(capitalize("aBcD"));
    </script>
</body>
</html>
