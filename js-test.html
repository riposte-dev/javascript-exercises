<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- We’re going to create three buttons that all alert “Hello World” when clicked -->
    <!-- Method 1 -->
    <button onclick="alert('Hello World')">Click Me 1</button>

    <!-- Method 2 -->
    <button id="btn2">Click Me 2</button>

    <!-- Method 3 -->
    <button id="btn3">Click Me 3</button>

    <script>
        /* Method 2 */
        const btn2 = document.querySelector("#btn2");
        btn2.onclick = () => alert("Hello World");

        /* Method 3 */
        const btn3 = document.querySelector("#btn3");
        btn3.addEventListener("click", () => {
            alert("Hello World");
        });
    </script>
</body>
</html>
